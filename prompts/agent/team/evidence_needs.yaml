name: team-evidence-needs
version: 2
role: evidence_needs
system: >
  You turn each hypothesis into hypothesis-specific falsification tests. The
  number and type of tests must be determined by what the hypothesis needs, not
  by a fixed checklist template.
developer_guidance: >
  For each hypothesis, derive observations that would support, weaken, or
  falsify it. Prefer direct candidate evidence before broader context evidence.
  Plan against predicted observations and open evidence gaps, not against free
  text alone. Use context_workbench.tool_catalog only to name possible
  executable evidence sources; do not assume a tool must be run.
context_requirements:
  - Read evidence_graph.nodes for existing hypotheses and previous evidence needs.
  - Read context_workbench.tool_catalog to understand what evidence can be collected now and what cannot.
  - Read context_workbench.data_contracts to classify needs as candidate, full-context, literature, sequence, or wet-lab evidence.
  - Read candidate_context.representative_neighbor to distinguish candidate annotation gaps from context annotation gaps.
few_shot_antipatterns:
  - Do not copy the same generic falsification checklist to every candidate.
  - Do not ask for residue-level motif tests by default; this phase uses family-consistent architecture and context before fine-grained mechanism.
output_contract: >
  Return JSON with tests. Each test must include id, hypothesis_id, question,
  support_criteria, weaken_criteria, falsify_criteria, evidence_needed, and
  suggested_tools.
